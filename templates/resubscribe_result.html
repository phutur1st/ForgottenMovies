{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto; text-align: center;">
    {% if success %}
        <div style="font-size: 3rem; color: #4caf50; margin-bottom: 1rem;">✓</div>
        <h2 style="color: #4caf50;">{{ page_title }}</h2>
    {% else %}
        <div style="font-size: 3rem; color: #e53935; margin-bottom: 1rem;">✗</div>
        <h2 style="color: #e53935;">{{ page_title }}</h2>
    {% endif %}

    <p style="font-size: 1.1rem; margin: 1.5rem 0;">{{ message }}</p>

    {% if email %}
        <p style="color: #9e9e9e; font-size: 0.9rem;">Email: <strong>{{ email }}</strong></p>
    {% endif %}

    <div style="margin-top: 2rem;">
        <p style="font-size: 0.95rem; color: #c5cae9;">
            You'll continue receiving reminders about unwatched content you requested.
        </p>
    </div>
</div>
{% endblock %}
