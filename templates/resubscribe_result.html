<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} • Forgotten Movies</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(135deg, #1e1e2f 0%, #24243e 100%);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .success { color: #4fc3f7; }
        .error { color: #e53935; }
        h1 {
            margin: 0 0 1.5rem 0;
            font-size: 1.75rem;
        }
        h1.success { color: #4fc3f7; }
        h1.error { color: #e53935; }
        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            color: #c5cae9;
        }
        .email-info {
            color: #9e9e9e;
            font-size: 0.9rem;
            margin: 1.5rem 0;
        }
        .email-info strong {
            color: #f5f5f5;
        }
        .info-section {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #424245;
        }
        .info-section p {
            font-size: 0.95rem;
            color: #c5cae9;
            margin: 0;
        }
        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #424245;
            font-size: 0.85rem;
            color: #757575;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if success %}
            <div class="icon success">✓</div>
            <h1 class="success">{{ page_title }}</h1>
        {% else %}
            <div class="icon error">✗</div>
            <h1 class="error">{{ page_title }}</h1>
        {% endif %}

        <div class="message">{{ message }}</div>

        {% if email %}
            <div class="email-info">Email: <strong>{{ email }}</strong></div>
        {% endif %}

        <div class="info-section">
            <p>You'll continue receiving reminders about unwatched content you requested.</p>
        </div>

        <div class="footer">
            Forgotten Movies
        </div>
    </div>
</body>
</html>
